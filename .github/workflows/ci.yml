name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pyyaml httpx "fastapi>=0.111" uvicorn pytest ruff
      - name: Lint
        run: ruff check .
      - name: Test (whole workspace)
        run: pytest -q
      - name: Eval harness vs baselines B0/B1/B2
        run: |
          python eval/replays/vizag-2025-01/generate.py
          python -m eval.harness --all
      - name: Upload replay report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-report
          path: eval/out/

  frontend:
    runs-on: ubuntu-latest
    # Non-blocking until the pnpm lockfile is committed; flip to false after.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @verge/console typecheck

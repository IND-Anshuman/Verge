[project]
name = "verge-llm"
version = "0.3.0"
description = "Swappable LLM provider abstraction (aimlapi <-> on-prem Ollama/vLLM)."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
http = ["httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["verge_llm"]

[project]
name = "verge-audit"
version = "0.3.0"
description = "Append-only, hash-chained, attributable audit log (Verge P6)."
requires-python = ">=3.11"
dependencies = ["verge-schema"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["verge_audit"]

[tool.uv.sources]
verge-schema = { workspace = true }
